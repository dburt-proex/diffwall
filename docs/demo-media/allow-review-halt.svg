<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">DiffWall ALLOW REVIEW HALT routing</title>
  <desc id="desc">Buyer-facing overview of DiffWall deterministic routing and evidence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#17233d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="100" y="115" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="58" font-weight="700">DiffWall</text>
  <text x="100" y="170" fill="#a9b7d0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="28">Deterministic governance for AI-assisted software changes</text>

  <g filter="url(#shadow)">
    <rect x="100" y="245" width="430" height="430" rx="28" fill="#10251f" stroke="#35d39a" stroke-width="3"/>
    <circle cx="170" cy="325" r="34" fill="#35d39a"/>
    <path d="M152 326l12 12 25-29" fill="none" stroke="#061511" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="220" y="338" fill="#eafff7" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="42" font-weight="700">ALLOW</text>
    <text x="145" y="420" fill="#bdebdc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24">Low-risk change</text>
    <text x="145" y="465" fill="#bdebdc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24">Policy checks passed</text>
    <text x="145" y="510" fill="#bdebdc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24">Evidence retained</text>
    <rect x="145" y="565" width="330" height="62" rx="18" fill="#163d31"/>
    <text x="310" y="606" text-anchor="middle" fill="#eafff7" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="600">Proceed under current policy</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="585" y="245" width="430" height="430" rx="28" fill="#2b2611" stroke="#f6c453" stroke-width="3"/>
    <circle cx="655" cy="325" r="34" fill="#f6c453"/>
    <path d="M655 304v28M655 347v3" fill="none" stroke="#211800" stroke-width="9" stroke-linecap="round"/>
    <text x="705" y="338" fill="#fff8dc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="42" font-weight="700">REVIEW</text>
    <text x="630" y="420" fill="#f8e6ac" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24">Human judgment required</text>
    <text x="630" y="465" fill="#f8e6ac" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24">Owners suggested</text>
    <text x="630" y="510" fill="#f8e6ac" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24">Reason and evidence shown</text>
    <rect x="630" y="565" width="330" height="62" rx="18" fill="#4a3c12"/>
    <text x="795" y="606" text-anchor="middle" fill="#fff8dc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="600">Pause for accountable review</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1070" y="245" width="430" height="430" rx="28" fill="#321719" stroke="#ff6b72" stroke-width="3"/>
    <circle cx="1140" cy="325" r="34" fill="#ff6b72"/>
    <path d="M1123 308l34 34M1157 308l-34 34" fill="none" stroke="#250709" stroke-width="9" stroke-linecap="round"/>
    <text x="1190" y="338" fill="#fff0f1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="42" font-weight="700">HALT</text>
    <text x="1115" y="420" fill="#ffc4c7" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24">Critical or destructive risk</text>
    <text x="1115" y="465" fill="#ffc4c7" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24">Evidence before failure</text>
    <text x="1115" y="510" fill="#ffc4c7" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24">Unsafe branch remains unmerged</text>
    <rect x="1115" y="565" width="330" height="62" rx="18" fill="#562326"/>
    <text x="1280" y="606" text-anchor="middle" fill="#fff0f1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="600">Stop and require resolution</text>
  </g>

  <text x="800" y="790" text-anchor="middle" fill="#d9e3f3" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="27">Repository-local policy • explainable findings • inspectable evidence • reversible pilot</text>
  <text x="800" y="840" text-anchor="middle" fill="#7f91ad" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20">Current maturity: early working enforcement system, not enterprise certification</text>
</svg>
