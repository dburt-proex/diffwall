name: DiffWall

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  diffwall:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          show-progress: false

      - name: Run DiffWall
        id: diffwall
        continue-on-error: true
        uses: ./action
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: HEAD
          config: rules/default.yml
          format: markdown
          fail-on-halt: true
          github-token: ${{ github.token }}

      - name: Upload DiffWall report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diffwall-pr-report
          path: diffwall-report.md
          if-no-files-found: warn

      - name: Enforce DiffWall result
        if: always()
        env:
          DIFFWALL_ACTION_OUTCOME: ${{ steps.diffwall.outcome }}
        run: |
          if [[ ! -f diffwall-report.md ]]; then
            echo "::error::DiffWall action failed before producing its report."
            exit 1
          fi

          if grep -q "DiffWall result: HALT" diffwall-report.md; then
            echo "::error::DiffWall routed this pull request to HALT."
            exit 2
          fi

          if [[ "$DIFFWALL_ACTION_OUTCOME" != "success" ]]; then
            echo "::error::DiffWall wrapper failed after producing a non-HALT report."
            exit 1
          fi
