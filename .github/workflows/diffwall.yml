name: DiffWall

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  diffwall:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          show-progress: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ensure immutable base commit is available
        env:
          DIFFWALL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if ! git cat-file -e "${DIFFWALL_BASE_SHA}^{commit}" 2>/dev/null; then
            git fetch --no-tags --depth=1 origin "$DIFFWALL_BASE_SHA"
          fi
          git cat-file -e "${DIFFWALL_BASE_SHA}^{commit}"

      - name: Run DiffWall
        id: diffwall
        continue-on-error: true
        uses: ./action
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: HEAD
          # Repo-local policy: DiffWall's own detector/policy/fixture files
          # necessarily embed the patterns it detects. self-scan.yml excludes
          # those definitional paths while keeping rules/default.yml strict for
          # downstream consumers.
          config: rules/self-scan.yml
          format: markdown
          fail_on_halt: true
          github_token: ${{ github.token }}

      - name: Capture DiffWall diagnostics
        if: always()
        env:
          DIFFWALL_ACTION_OUTCOME: ${{ steps.diffwall.outcome }}
          DIFFWALL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          {
            echo "action_outcome=$DIFFWALL_ACTION_OUTCOME"
            echo "base_sha=$DIFFWALL_BASE_SHA"
            echo "head_sha=$(git rev-parse HEAD)"
            if git cat-file -e "${DIFFWALL_BASE_SHA}^{commit}" 2>/dev/null; then
              echo "base_commit_available=true"
            else
              echo "base_commit_available=false"
            fi
            echo "report_files:"
            find "$GITHUB_WORKSPACE" -maxdepth 4 -type f -name 'diffwall-report.*' -print
            echo "action_logs:"
            find "$GITHUB_WORKSPACE" -maxdepth 4 -type f \( -name 'diffwall-action.log' -o -name 'diffwall-composite.log' \) -print
            if [[ -f diffwall-report.md ]]; then
              echo "report_content:"
              cat diffwall-report.md
            fi
          } > diffwall-diagnostics.txt

      - name: Upload DiffWall evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diffwall-pr-evidence
          path: |
            diffwall-report.md
            diffwall-action.log
            diffwall-composite.log
            diffwall-diagnostics.txt
          if-no-files-found: error

      - name: Enforce DiffWall result
        if: always()
        env:
          DIFFWALL_ACTION_OUTCOME: ${{ steps.diffwall.outcome }}
        run: |
          if [[ ! -f diffwall-report.md ]]; then
            echo "::error::DiffWall action failed before producing its report."
            exit 1
          fi

          if grep -q "DiffWall result: HALT" diffwall-report.md; then
            echo "::error::DiffWall routed this pull request to HALT."
            exit 2
          fi

          if [[ "$DIFFWALL_ACTION_OUTCOME" != "success" ]]; then
            echo "::error::DiffWall wrapper failed after producing a non-HALT report."
            exit 1
          fi
