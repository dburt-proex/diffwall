name: Action Loader Debug

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/live-action-validation.md"

permissions:
  contents: read

jobs:
  loader:
    runs-on: ubuntu-latest
    steps:
      - name: Quiet clone of PR branch
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: git clone --quiet --depth 1 --branch "$HEAD_REF" "https://github.com/${GITHUB_REPOSITORY}.git" .

      - name: Invoke local DiffWall action
        uses: ./action
        with:
          diff: test/fixtures/safe-doc-change.diff
          format: markdown
          fail_on_halt: false
