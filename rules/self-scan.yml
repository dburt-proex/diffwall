# DiffWall self-scan policy.
#
# DiffWall's own repository necessarily contains the very patterns it detects:
#   - detector definitions (src/rules/**, diffwall/rules.py) embed keywords like
#     "child_process", secret regexes, and SQL verbs;
#   - the policy files (rules/**) list halt patterns such as "DROP TABLE";
#   - the test/demo/example fixtures carry deliberate attack strings;
#   - the committed dist/** bundle is compiler output from those same definitions.
#
# Scanning those paths against the content rules would always HALT, so this
# repo-local config ignores them while STILL enforcing the full policy on the
# real TypeScript source, workflow files, package manifests, action wrapper, and
# Python engine/models/cli/report. The release-readiness workflow independently
# rebuilds source and fails when committed dist/** differs from compiler output.
# Thresholds, protected paths, and halt patterns are identical to
# rules/default.yml — the shipped default stays strict for every other consumer.
thresholds:
  review: 40
  halt: 75

ignorePaths:
  - "docs/**"
  - "*.md"
  - "rules/**"
  - "policy-packs/**"
  - "src/rules/**"
  - "dist/**"
  - "test/**"
  - "demo/**"
  - "packages/action-firewall/diffwall/rules.py"
  - "packages/action-firewall/tests/**"
  - "packages/action-firewall/examples/**"
  - "packages/action-firewall/demo/**"

protectedPaths:
  - ".github/workflows/**"
  - "package.json"
  - "package-lock.json"
  - "pnpm-lock.yaml"
  - "yarn.lock"
  - "requirements.txt"
  - "pyproject.toml"
  - "go.mod"
  - "go.sum"
  - "src/auth/**"
  - "src/security/**"
  - "auth/**"
  - "security/**"
  - "billing/**"
  - "db/migrations/**"
  - "migrations/**"

haltPatterns:
  - "DROP TABLE"
  - "TRUNCATE TABLE"
  - "rm -rf"
  - "chmod 777"
  - "rejectUnauthorized: false"
  - "verify: false"
  - "verify=False"
  - "NODE_TLS_REJECT_UNAUTHORIZED=0"
